<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Email Classifier</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: #eef3f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            background: linear-gradient(to right,#2563eb,#1e40af);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top:20px;
        }

        textarea{
            resize:none;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .btn-custom{
            background:#2563eb;
            color:white;
            font-size:18px;
            padding:10px 25px;
        }

        .btn-custom:hover{
            background:#1d4ed8;
            color:white;
        }

        #result{
            display:none;
            font-size:22px;
            font-weight:bold;
            margin-top:20px;
        }

        .footer{
            margin-top:50px;
            text-align:center;
            color:gray;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="header text-center">

        <h1>
            <i class="fa-solid fa-envelope-circle-check"></i>
            Smart Email Classifier
        </h1>

        <p class="mt-3">
            AI Powered Email Spam Detection using Machine Learning
        </p>

    </div>


    <div class="row mt-4">

        <div class="col-lg-8">

            <div class="card p-4">

                <h4>
                    <i class="fa-solid fa-envelope"></i>
                    Enter Email
                </h4>

                <textarea
                    id="emailText"
                    rows="10"
                    class="form-control mt-3"
                    placeholder="Paste your email content here..."></textarea>

                <div class="mt-4">

                    <button
                        class="btn btn-custom"
                        onclick="predictEmail()">

                        <i class="fa-solid fa-magnifying-glass"></i>

                        Predict Email

                    </button>

                    <button
                        class="btn btn-secondary"
                        onclick="clearText()">

                        Clear

                    </button>

                </div>

                <div
                    id="result"
                    class="alert mt-4">
                </div>

            </div>

        </div>




    <div class="footer">

        <hr>

        <h5>

            Developed by Lavanya C

        </h5>

        <p>

            Machine Learning Internship Project • 2026

        </p>

    </div>

</div>



<script>

async function predictEmail(){

    const email=document.getElementById("emailText").value;

    if(email.trim()==""){

        alert("Please enter email text.");

        return;

    }

    const button=document.querySelector(".btn-custom");

    button.innerHTML="Predicting...";

    try{

        const response=await fetch("http://127.0.0.1:5000/predict",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email:email
            })

        });

        const data=await response.json();

        const result=document.getElementById("result");

        result.style.display="block";

        if(data.prediction=="Spam"){

            result.className="alert alert-danger mt-4";

            result.innerHTML="🚫 <b>Spam Email</b>";

        }

        else{

            result.className="alert alert-success mt-4";

            result.innerHTML="✅ <b>Safe Email (Not Spam)</b>";

        }

    }

    catch(error){

        document.getElementById("result").style.display="block";

        document.getElementById("result").className="alert alert-warning mt-4";

        document.getElementById("result").innerHTML="Server Error!";

    }

    button.innerHTML='<i class="fa-solid fa-magnifying-glass"></i> Predict Email';

}

function clearText(){

    document.getElementById("emailText").value="";

    document.getElementById("result").style.display="none";

}

</script>

</body>
</html>
